<div class="popup popup--google-store-popup" id="google-store-popup">
    <div class="popup__close">
        <span></span>
        <span></span>
    </div>
    <picture class="popup__starline dark">
        <source srcset="/images/popup-starline-dark.webp" type="image/webp">
        <img src="/images/popup-starline-dark.png" alt="image not found">
    </picture>
    <picture class="popup__starline light">
        <source srcset="/images/popup-starline-light.webp" type="image/webp">
        <img src="/images/popup-starline-light.png" alt="image not found">
    </picture>
    <div class="popup__inner">
        <div class="popup__content">
            <span class="popup__subtitle">Scan the QR code</span>
            <h2 class="popup__title">
                <span>to download</span> <b data-text="Pink Wallet">Pink Wallet</b> <span>app</span>
            </h2>
            <img src="/images/google-qr.png" alt="image not found">
        </div>
    </div>
</div>
